      - heading "Understanding NHS Continuing Healthcare" [level=1] [ref=e23]
      - paragraph [ref=e24]: A plain-English starting point for families who have heard about NHS Continuing Healthcare and need to understand the route.
      - generic [ref=e25]: 2 June 2026 · Yvonne Brown
    - article [ref=e26]:
      - generic [ref=e27]:
        - paragraph [ref=e28]: NHS Continuing Healthcare, often shortened to CHC, is a package of care arranged and funded by the NHS for adults with a primary health need.
        - paragraph [ref=e29]: The process can involve a Checklist screening stage and, where the threshold is met, a full assessment using the Decision Support Tool. A positive Checklist does not automatically mean someone is eligible for CHC. It means the person should receive a full assessment.
        - heading "What families can prepare" [level=2] [ref=e30]
        - generic [ref=e31]:
          - paragraph [ref=e32]: "- Recent care plans and review notes"
          - list [ref=e33]:
            - listitem [ref=e34]: Hospital discharge notes
            - listitem [ref=e35]: Medication records
            - listitem [ref=e36]: Incident, falls or risk records
            - listitem [ref=e37]: Family observations about daily needs
            - listitem [ref=e38]: Decision letters and assessment paperwork
        - paragraph [ref=e39]: The aim is not to make the story more dramatic. The aim is to make needs, risks and evidence clear.
