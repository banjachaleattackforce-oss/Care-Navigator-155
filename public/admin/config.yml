backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

site_url: https://carenavigate.org
display_url: https://carenavigate.org
logo_url: /images/care-navigator-logo.jpeg

collections:
  - name: tags
    label: Tags
    label_singular: Tag
    folder: content/tags
    create: true
    format: frontmatter
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}}"
    sortable_fields: ["title"]
    fields:
      - label: Tag name
        name: title
        widget: string
      - label: Slug
        name: slug
        widget: string
        pattern:
          - "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          - "Use lowercase letters, numbers and hyphens only."
      - label: Description
        name: description
        widget: text
        required: false
      - label: Show on website
        name: featured
        widget: boolean
        default: true

  - name: news
    label: News
    label_singular: News post
    folder: content/news
    create: true
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "news/{{slug}}"
    sortable_fields: ["date", "title", "author"]
    view_filters:
      - label: Published
        field: published
        pattern: true
      - label: Drafts
        field: published
        pattern: false
    fields:
      - label: Published
        name: published
        widget: boolean
        default: true
      - label: Title
        name: title
        widget: string
      - label: Slug
        name: slug
        widget: string
        pattern:
          - "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          - "Use lowercase letters, numbers and hyphens only."
      - label: Publish date
        name: date
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
      - label: Author
        name: author
        widget: string
        default: "Yvonne Brown"
      - label: Category
        name: category
        widget: select
        options:
          - NHS CHC
          - Care funding
          - Self-funding
          - Complex care planning
          - Appeals and advocacy
          - Professional guidance
          - Family guidance
        default: Family guidance
      - label: Summary
        name: summary
        widget: text
      - label: Featured image
        name: featuredImage
        widget: image
        required: false
      - label: Featured image alt text
        name: featuredImageAlt
        widget: string
        required: false
      - label: Tags
        name: tags
        widget: relation
        collection: tags
        search_fields: ["title", "slug"]
        value_field: slug
        display_fields: ["title"]
        multiple: true
        required: false
      - label: SEO title
        name: seoTitle
        widget: string
        required: false
      - label: SEO description
        name: seoDescription
        widget: text
        required: false
      - label: Article CTA blocks
        name: ctaBlocks
        widget: list
        required: false
        summary: "{{fields.type}} - {{fields.heading}}"
        hint: "Optional blocks shown at the end of the article. Use these for consultation, professional referral, newsletter signup or a custom link."
        fields:
          - label: Type
            name: type
            widget: select
            default: consultation
            options:
              - label: Consultation enquiry block
                value: consultation
              - label: Professional referral block
                value: professional-referral
              - label: Newsletter signup block
                value: newsletter
              - label: Custom link block
                value: custom-link
          - label: Heading
            name: heading
            widget: string
            default: "Not sure where to start?"
          - label: Text
            name: text
            widget: text
            default: "Book a calm first conversation before the next care-funding decision."
          - label: Button label
            name: buttonLabel
            widget: string
            default: "Book a Free Initial Consultation"
          - label: Button URL
            name: buttonUrl
            widget: string
            default: "/contact#consultation"
      - label: Body
        name: body
        widget: markdown
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
        editor_components:
          - image
