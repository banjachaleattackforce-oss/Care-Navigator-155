[build]
  command = "npm run build"
  publish = "out"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/favicon.ico"
  to = "/images/the-care-navigator-mark.svg"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
